{% extends 'admin/base.html' %}
{% block content %}

    <div class="mb-6">
        <h2 class="text-3xl font-bold text-gray-800">Gallery Upload</h2>
        <p class="text-gray-600">Upload clinic photos and procedure results to the public gallery.</p>
    </div>

    <div class="bg-white rounded-lg shadow p-6 mb-8 max-w-2xl">
        <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">Upload New Media</h3>
        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Select Image File</label>
                <input type="file" name="image" required class="w-full border p-2 rounded" accept="image/*">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Caption (Optional)</label>
                <input type="text" name="caption" class="w-full border p-2 rounded" placeholder="e.g. State of the art Operation Theatre">
            </div>
            <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded shadow">Upload to Gallery</button>
        </form>
    </div>

    <h3 class="text-xl font-bold text-gray-800 mb-4">Uploaded Assets</h3>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        {% for img in images %}
        <div class="bg-white p-2 rounded shadow">
            <img src="{{ url_for('static', filename=img.image_path) }}" class="w-full h-40 object-cover rounded mb-2">
            <p class="text-sm text-gray-600 text-center truncate" title="{{ img.caption }}">{{ img.caption or 'No caption' }}</p>
        </div>
        {% else %}
        <p class="text-gray-500 italic">No media uploaded yet.</p>
        {% endfor %}
    </div>

{% endblock %}
