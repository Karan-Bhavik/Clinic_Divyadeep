<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal - Divyadeep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900 flex">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 h-screen fixed top-0 left-0 text-white flex flex-col shadow-xl">
        <div class="p-6 pb-2 border-b border-gray-800">
            <h1 class="text-2xl font-bold flex items-center text-teal-400">
                <i class="fa-solid fa-leaf mr-3"></i> Admin
            </h1>
            <p class="text-xs text-gray-500 mt-2">v.1.0 CMS</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <a href="{{ url_for('admin_dashboard') }}" class="flex items-center px-4 py-3 bg-gray-800 rounded-lg text-gray-300 hover:text-white hover:bg-teal-600 transition">
                <i class="fa-solid fa-chart-line w-6"></i> Dashboard / Appointments
            </a>
            <a href="{{ url_for('admin_settings') }}" class="flex items-center px-4 py-3 bg-gray-800 rounded-lg text-gray-300 hover:text-white hover:bg-teal-600 transition">
                <i class="fa-solid fa-address-card w-6"></i> Clinic & Doctor Profile
            </a>
            <a href="{{ url_for('admin_treatments') }}" class="flex items-center px-4 py-3 bg-gray-800 rounded-lg text-gray-300 hover:text-white hover:bg-teal-600 transition">
                <i class="fa-solid fa-list w-6"></i> Treatments
            </a>
            <a href="{{ url_for('admin_reviews') }}" class="flex items-center px-4 py-3 bg-gray-800 rounded-lg text-gray-300 hover:text-white hover:bg-teal-600 transition">
                <i class="fa-solid fa-star w-6"></i> Reviews
            </a>
            <a href="{{ url_for('admin_gallery') }}" class="flex items-center px-4 py-3 bg-gray-800 rounded-lg text-gray-300 hover:text-white hover:bg-teal-600 transition">
                <i class="fa-solid fa-images w-6"></i> Gallery
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <a href="{{ url_for('admin_logout') }}" class="block text-center bg-gray-800 text-red-400 py-2 rounded hover:bg-red-900 hover:text-white font-bold transition">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 p-8">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-6">
                {% for message in messages %}
                    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
                        {{ message }}
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>

</body>
</html>
